# cargo-dist — per-app artifacts & installers (§15.3). Each bin ships standalone;
# nobody downloads the suite to get one tool.
# STARTING STUB — finalize with `dist init` before the first release (§16 step 7);
# that regenerates this file and the release workflow, and pins the dist version.
[workspace]
members = ["cargo:."]   # the Cargo workspace at the repo root (members = crates/*)

[dist]
cargo-dist-version = "0.28.0"
ci = "github"
installers = ["shell", "powershell", "homebrew"]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
install-updater = false
