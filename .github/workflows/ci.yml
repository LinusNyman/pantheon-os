# CI on every PR (§15.2). Toolchain pinned to the workspace MSRV (1.88, see
# rust-toolchain.toml) so cross-target std lands on the toolchain cargo runs.
name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # NOTE: -D warnings is scoped to clippy below, not global — a global RUSTFLAGS
  # would also deny warnings in third-party deps and break on their next release.

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -W clippy::pedantic -D warnings

  test:
    name: nextest + insta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      # A core's contract test drives its own binary via CARGO_BIN_EXE_<name>, which
      # cargo builds for it. But the integration gates cross tools — `alb` writes and
      # `pan resolve` reads it back over PATH (§5.0, I5) — and cargo builds no bin for
      # a crate that is not the one under test. Build them all first, or those gates
      # fail on a missing binary rather than on what they are meant to prove.
      - run: cargo build --workspace --bins
      # The headless half (§14): every crate must still build with the screen dropped.
      # Nothing else catches this class — a `#[cfg(feature = "tui")]` left orphaned onto
      # the item below a deleted `mod` compiles cleanly under --all-features and takes a
      # `use` out of the non-tui build, which is exactly how it happened once.
      - run: cargo build --workspace --no-default-features
      # --no-tests=pass: a stub workspace has no tests yet; that is success, not failure.
      - run: cargo nextest run --workspace --all-features --no-tests=pass
      # insta snapshots are asserted inside the tests above; fail if any are pending.
      - run: test -z "$(find . -name '*.snap.new' -print -quit)"

  audit:
    name: audit + deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit, cargo-deny
      - run: cargo audit                            # advisories
      - run: cargo deny check bans licenses sources # licenses/bans/sources (advisories handled by audit)

  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, linker: gcc-aarch64-linux-gnu }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross linker
        if: matrix.linker != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker }}
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - run: cargo build --workspace --target ${{ matrix.target }}

  # dist plan (§15.2) is added when the release workflow is generated with
  # `dist init` (§15.3) — deferred until there is a shippable binary (§16 step 7).
